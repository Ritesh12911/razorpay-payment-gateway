<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Successful | PaySecure</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .result-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-xl);
      position: relative;
      z-index: 1;
    }

    .result-card {
      max-width: 480px;
      width: 100%;
      background: var(--bg-card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border-card);
      border-radius: var(--radius-2xl);
      padding: var(--space-3xl) var(--space-2xl);
      text-align: center;
      animation: fadeInUp 0.6s ease-out;
    }

    .result-icon {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto var(--space-xl);
      position: relative;
    }

    .result-icon--success {
      background: rgba(52, 211, 153, 0.1);
      border: 2px solid rgba(52, 211, 153, 0.3);
      color: var(--accent-emerald);
      animation: successPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
    }

    .result-icon--success::after {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 2px solid rgba(52, 211, 153, 0.15);
      animation: ringPulse 2s ease-out infinite;
    }

    @keyframes successPop {
      from { transform: scale(0); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    @keyframes ringPulse {
      0% { transform: scale(1); opacity: 0.6; }
      100% { transform: scale(1.3); opacity: 0; }
    }

    .result-title {
      font-family: var(--font-heading);
      font-size: 1.75rem;
      font-weight: 800;
      margin-bottom: var(--space-sm);
      color: var(--accent-emerald);
      animation: fadeInUp 0.5s ease-out 0.3s both;
    }

    .result-subtitle {
      color: var(--text-secondary);
      font-size: 0.95rem;
      margin-bottom: var(--space-2xl);
      animation: fadeInUp 0.5s ease-out 0.4s both;
    }

    .result-details {
      background: rgba(15, 15, 42, 0.6);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: var(--space-lg);
      margin-bottom: var(--space-2xl);
      text-align: left;
      animation: fadeInUp 0.5s ease-out 0.5s both;
    }

    .result-detail-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
    }

    .result-detail-row:not(:last-child) {
      border-bottom: 1px solid var(--border-subtle);
    }

    .result-detail-row .label {
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    .result-detail-row .value {
      color: var(--text-primary);
      font-size: 0.85rem;
      font-weight: 600;
      font-family: 'Inter', monospace;
      word-break: break-all;
      text-align: right;
      max-width: 60%;
    }

    .result-actions {
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
      animation: fadeInUp 0.5s ease-out 0.6s both;
    }

    .result-btn {
      padding: 14px 24px;
      border-radius: var(--radius-md);
      font-family: var(--font-body);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition-base);
      text-decoration: none;
      text-align: center;
    }

    .result-btn--primary {
      background: var(--gradient-btn);
      border: none;
      color: white;
      box-shadow: var(--shadow-btn);
    }

    .result-btn--primary:hover {
      box-shadow: var(--shadow-btn-hover);
      transform: translateY(-2px);
    }

    .result-btn--secondary {
      background: rgba(129, 140, 248, 0.06);
      border: 1px solid var(--border-card);
      color: var(--text-primary);
    }

    .result-btn--secondary:hover {
      background: rgba(129, 140, 248, 0.12);
      border-color: var(--accent-indigo);
    }

    .confetti {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1000;
      overflow: hidden;
    }

    .confetti-piece {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 2px;
      top: -10px;
      animation: confettiFall linear forwards;
    }

    @keyframes confettiFall {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>
  <!-- Animated Background -->
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-glow bg-glow--1" aria-hidden="true"></div>
  <div class="bg-glow bg-glow--2" aria-hidden="true"></div>

  <!-- Confetti Container -->
  <div class="confetti" id="confetti-container"></div>

  <div class="result-page">
    <div class="result-card">
      <div class="result-icon result-icon--success" id="success-icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>

      <h1 class="result-title">Payment Successful!</h1>
      <p class="result-subtitle">Your payment has been processed and verified securely.</p>

      <div class="result-details" id="payment-details">
        <div class="result-detail-row">
          <span class="label">Payment ID</span>
          <span class="value" id="detail-payment-id">—</span>
        </div>
        <div class="result-detail-row">
          <span class="label">Order ID</span>
          <span class="value" id="detail-order-id">—</span>
        </div>
        <div class="result-detail-row">
          <span class="label">Amount</span>
          <span class="value" id="detail-amount">—</span>
        </div>
        <div class="result-detail-row">
          <span class="label">Plan</span>
          <span class="value" id="detail-plan">—</span>
        </div>
        <div class="result-detail-row">
          <span class="label">Status</span>
          <span class="value" style="color: var(--accent-emerald);">✓ Verified</span>
        </div>
      </div>

      <div class="result-actions">
        <a href="/" class="result-btn result-btn--primary" id="btn-go-home">Back to Home</a>
        <button class="result-btn result-btn--secondary" id="btn-download-receipt" onclick="downloadReceipt()">Download Receipt</button>
      </div>
    </div>
  </div>

  <script>
    // Parse URL params
    const params = new URLSearchParams(window.location.search);

    document.getElementById('detail-payment-id').textContent = params.get('payment_id') || '—';
    document.getElementById('detail-order-id').textContent = params.get('order_id') || '—';
    document.getElementById('detail-plan').textContent = params.get('plan') || 'Custom Payment';

    const amount = params.get('amount');
    if (amount) {
      document.getElementById('detail-amount').textContent = new Intl.NumberFormat('en-IN', {
        style: 'currency',
        currency: 'INR',
        minimumFractionDigits: 0,
      }).format(amount);
    }

    // Confetti Animation
    function createConfetti() {
      const container = document.getElementById('confetti-container');
      const colors = ['#818cf8', '#c084fc', '#f472b6', '#34d399', '#fbbf24', '#60a5fa'];

      for (let i = 0; i < 60; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = Math.random() * 100 + '%';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDuration = (Math.random() * 2 + 2) + 's';
        piece.style.animationDelay = (Math.random() * 1.5) + 's';
        piece.style.width = (Math.random() * 8 + 4) + 'px';
        piece.style.height = (Math.random() * 8 + 4) + 'px';
        container.appendChild(piece);
      }

      // Remove confetti after animation
      setTimeout(() => container.innerHTML = '', 5000);
    }

    createConfetti();

    // Download Receipt
    function downloadReceipt() {
      const receiptData = {
        'Payment ID': params.get('payment_id') || 'N/A',
        'Order ID': params.get('order_id') || 'N/A',
        'Amount': document.getElementById('detail-amount').textContent,
        'Plan': params.get('plan') || 'Custom Payment',
        'Status': 'Verified',
        'Date': new Date().toLocaleString('en-IN'),
      };

      let text = '═══════════════════════════════════\n';
      text += '        PAYMENT RECEIPT\n';
      text += '        PaySecure Gateway\n';
      text += '═══════════════════════════════════\n\n';

      for (const [key, value] of Object.entries(receiptData)) {
        text += `${key}: ${value}\n`;
      }

      text += '\n═══════════════════════════════════\n';
      text += '  Thank you for your payment!\n';
      text += '═══════════════════════════════════\n';

      const blob = new Blob([text], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `receipt_${params.get('payment_id') || 'payment'}.txt`;
      a.click();
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
